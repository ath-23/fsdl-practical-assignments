<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
    <style>
        .login-container { width: 500px; margin-top: 80px; margin-bottom: 20px;}
        .custom-signup-text { font-weight: 700; text-align: center; color: #333; margin-bottom: 20px; line-height: 1;}
        .custom-signup-text span {color: #0d6efd; font-size: 0.6em; font-weight: 400; }
    </style>
</head>

<body class="bg-light">

    <!--login user-->
    <div class="container d-flex justify-content-center">
        <div class="card p-4 shadow login-container">
            <h3 class="text-center mb-4">Login</h3>
            
            <form onsubmit="event.preventDefault(); alert('Login Successful!'); window.location.href='home.html';">
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Sign In</button>
            </form>

            <div class="text-center mt-3">
                <a href="home.html" class="text-decoration-none small">Return to Store</a>
            </div>
        </div>
    </div>

    <h1 class="custom-signup-text mt-5">        <!--mt-5 adds top margin to h1 text. it is a bootstrap class, can directly mention margin-top in style tag otherwise-->
        Don't have an account? <br> 
        <span>Sign up below.</span>
    </h1>

    <!--register user-->
    <div class="container d-flex justify-content-center">
        <div class="card p-4 shadow login-container">
            <h3 class="text-center mb-4">Sign Up</h3>
            
            <form onsubmit="event.preventDefault(); alert('Sign Up Successful!'); window.location.href='home.html';">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" placeholder="Harvey Specter" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of birth</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Set Password</label>
                    <input type="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-dark w-100">Sign Up</button>
            </form>

            <div class="text-center mt-3">
                <a href="home.html" class="text-decoration-none small">Return to Store</a>
            </div>

        </div>
    </div>
</body>
</html>
