<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Your Cart</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand" href="home.html">← Back to Shop</a></div>
    </nav>

    <div class="container">
        <h3>Shopping Cart</h3>
        <div class="card p-4 shadow-sm">
            <ul id="cart-list" class="list-group list-group-flush mb-3">
                </ul>
            <div class="d-flex justify-content-between border-top pt-3">
                <h4>Total:</h4>
                <h4 id="total-price">$0.00</h4>
            </div>
            <button class="btn btn-success mt-3" onclick="clearCart()">Checkout</button>
        </div>
    </div>

    <script>
        const cart = JSON.parse(sessionStorage.getItem('cart')) || [];
        const list = document.getElementById('cart-list');
        let total = 0;

        if(cart.length === 0) {
            list.innerHTML = "<li class='list-group-item'>Your cart is empty</li>";
        } else {
            cart.forEach(item => {
                let li = document.createElement('li');
                li.className = "list-group-item d-flex justify-content-between";
                li.innerHTML = `<span>${item.name}</span> <b>$${item.price}</b>`;
                list.appendChild(li);
                total += item.price;
            });
        }
        document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;

        function clearCart() {
            alert("Thank you for your purchase!");
            sessionStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
